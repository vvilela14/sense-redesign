<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Dra Patrícia Naves de Resende  — Sense Consulta</title>
  <link rel="icon" type="image/png" href="images/brand/Sense-icon-S.png"/>
  <link rel="preconnect" href="https://api.fontshare.com"/>
  <link rel="stylesheet" href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,600,700,800&display=swap"/>
  <style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Satoshi',-apple-system,sans-serif;color:#062533;background:#fff;-webkit-font-smoothing:antialiased;}
  a{color:inherit;text-decoration:none;}
  .container{max-width:960px;margin:0 auto;padding:0 24px;}
  /* NAV: see nav.js */
  /* PROFILE HEADER */
  .profile-header{padding:48px 0 40px;background:#fff;}
  .profile-header-inner{display:flex;gap:32px;align-items:flex-start;}
  .profile-photo-wrap{flex-shrink:0;}
  .profile-photo{width:200px;height:auto;border-radius:16px;object-fit:cover;object-position:top;border:2px solid #eaeaea;}
  .profile-avatar{width:200px;height:240px;border-radius:16px;background:linear-gradient(135deg,#fbf3ec,#feddd6);display:flex;align-items:center;justify-content:center;font-size:56px;font-weight:800;color:#e06253;}
  .profile-info{flex:1;padding-top:0;}
  .back-link{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:#6a7a85;margin-bottom:20px;transition:color .15s;}
  .back-link:hover{color:#e06253;}
  .profile-name{font-size:32px;font-weight:800;letter-spacing:-.02em;margin-bottom:4px;}
  .profile-specialty-row{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
  .profile-specialty{font-size:17px;color:#1f3340;font-weight:500;}
  .verified-tag{display:inline-flex;align-items:center;gap:4px;font-size:13px;font-weight:600;color:#16a34a;}
  .profile-crm{font-size:14px;color:#6a7a85;margin-bottom:4px;}
  .profile-rqe{font-size:14px;color:#6a7a85;margin-bottom:20px;}
  .btn-agendar{display:inline-flex;align-items:center;gap:8px;background:#e06253;color:#fff;font-size:15px;font-weight:600;padding:12px 24px;border-radius:9999px;border:none;cursor:pointer;transition:background .15s;text-decoration:none;white-space:nowrap;}
  .btn-agendar:hover{background:#c64f41;}
  /* MAIN SECTION */
  .profile-main-section{background:#f7f7f7;border-radius:20px;padding:36px;margin:0 0 32px;}
  .main-section-inner{display:grid;grid-template-columns:1fr;gap:24px;}
  
  .section-title-lg{font-size:22px;font-weight:800;margin-bottom:16px;letter-spacing:-.01em;}
  .consult-row{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:24px;}
  .consult-chip{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:#6a7a85;}
  .subsection-title{font-size:14px;font-weight:700;color:#062533;margin-bottom:10px;}
  .treat-chips{display:flex;flex-wrap:wrap;gap:8px;}
  .treat-chip{background:#fff;border:1.5px solid #eaeaea;color:#1f3340;font-size:13px;font-weight:500;padding:5px 14px;border-radius:9999px;}
  /* LOCATION */
  .location-block{margin-top:28px;}
  .location-name{font-size:14px;font-weight:700;color:#062533;margin-bottom:2px;}
  .location-addr{font-size:13px;color:#6a7a85;line-height:1.6;}
  /* CALENDAR */
  
  
  
  
  .cal-nav:hover{color:#e06253;}
  
  .cal-table thead th{padding:8px 4px;text-align:center;font-size:11px;font-weight:600;color:#6a7a85;text-transform:lowercase;}
  .cal-table td{padding:7px 4px;text-align:center;color:#1f3340;cursor:pointer;border-radius:6px;}
  .cal-day:hover{background:#fbf3ec;color:#e06253;}
  
  
  /* CONTENT SECTIONS */
  .content-section{background:#f7f7f7;border-radius:20px;padding:32px;margin-bottom:20px;}
  .content-title{font-size:18px;font-weight:800;margin-bottom:20px;letter-spacing:-.01em;}
  .content-subtitle{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#6a7a85;margin-bottom:8px;margin-top:16px;}
  .content-subtitle:first-child{margin-top:0;}
  .content-text{font-size:14px;color:#1f3340;line-height:1.7;}
  .profile-list{list-style:none;padding:0;display:flex;flex-direction:column;gap:6px;}
  .profile-list li{font-size:14px;color:#1f3340;padding-left:14px;position:relative;line-height:1.5;}
  .profile-list li::before{content:'';position:absolute;left:0;top:7px;width:5px;height:5px;border-radius:50%;background:#e06253;}
  /* FOOTER */
  .page-footer{background:#062533;color:rgba(255,255,255,.5);text-align:center;padding:24px;font-size:13px;margin-top:60px;}
  .page-footer a{color:#ffd0b2;}

  /* LOCATION SECTION */
  .location-section{background:#fff;padding:72px 0 80px;}
  .location-inner{max-width:960px;margin:0 auto;padding:0 24px;text-align:center;}
  .location-label{display:inline-block;font-size:13px;font-weight:600;color:#6a7a85;letter-spacing:.08em;text-transform:uppercase;margin-bottom:14px;background:#f7f7f7;padding:5px 14px;border-radius:9999px;}
  .location-title{font-size:clamp(28px,4vw,42px);font-weight:800;color:#062533;margin:0 0 12px;letter-spacing:-.02em;}
  .location-sub{font-size:16px;color:#6a7a85;margin:0 0 48px;line-height:1.6;}
  .location-body{display:grid;grid-template-columns:320px 1fr;gap:24px;text-align:left;align-items:stretch;}
  @media(max-width:720px){.location-body{grid-template-columns:1fr;}}
  .location-card{background:#fbf3ec;border-radius:20px;padding:32px;display:flex;flex-direction:column;gap:20px;}
  .location-icon-wrap{width:44px;height:44px;background:#e06253;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0;}
  .location-name{font-size:16px;font-weight:700;color:#062533;margin:0 0 8px;}
  .location-addr{font-size:14px;color:#6a7a85;line-height:1.7;margin:0;}
  .location-maps-btn{display:inline-flex;align-items:center;gap:8px;background:#c64f41;color:#fff;font-size:15px;font-weight:700;padding:12px 24px;border-radius:9999px;text-decoration:none;margin-top:auto;transition:background .15s;width:fit-content;}
  .location-maps-btn:hover{background:#a83e33;}
  .location-map{border-radius:20px;overflow:hidden;min-height:400px;}
  .location-map iframe{display:block;width:100%;height:100%;min-height:400px;}

</style>
</head>
